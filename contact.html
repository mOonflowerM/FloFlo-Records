</div>

<div class="container py-5">
    <div class="row justify-content-between align-items-center g-3">
        <div class="col-12 formaColor p-3 rounded  col-md-5">
            <div class="row title mb-3">
                <h4 class="fw-normal fw-lighter ">send us a message</h4>
            </div>
            <form action="#" method="get" class="formaColor" id="formaColorVal">
                <div class="mb-3">
                     <label for="nameForm" class="form-label">Place your Full Name</label>
                    <input type="text" class="form-control" id="nameForm">
                    <p id="nameError" class="text-danger small"></p>
                  </div>
                  <div class="mb-3">
                     <label for="emailForm" class="form-label">Place your email</label>
                    <input type="email" class="form-control" id="emailFormContact">
                    <p id="emailErrorContact" class="text-danger small"></p>
                  </div>

                  <div class="mb-3">
                    <label for="ddlSubject" class="form-label">Choose a subject:</label>
                    <select id="ddlSubject" class="form-select">
                    </select>
                    <p id="ddlSubjectError" class="text-danger small"></p>
                  </div>
                  <div class="mb-3">
                      <textarea id="sendText" class="form-control" rows="4" placeholder="Message"></textarea>
                     <p id="textErr" class="text-danger small"></p>
                  </div>
                    <div class="mb-3">
                        <input class="form-check-input" type="checkbox" id="checkRules" value="1">
                            <label class="form-check-label" for="checkRules">
                               I agree to the terms and conditions.
                            </label>
                             <p id="chkError" class="text-danger small"></p>
                  </div>
<p id="successContactForm" class="text-success m-3 text-center"></p>
                  <div class="btn-Form">
                    <button type="submit" class=" btn btn-mine py-2 px-4 d-inline-block mt-1">Submit</button>
                </div>
                  

            </form>
        </div>
